name: Build and Push Docker Image (Docker Hub)

on:
  push:
    branches:
      - main
      - master
    paths:
      - '**.py'
      - 'requirements.txt'
      - 'Dockerfile'
      - 'templates/**'
      - '.github/workflows/docker-build-push.yml'
  workflow_dispatch:

env:
  # 统一方案一：发布到我们可控的 Docker Hub 账号命名空间
  DOCKERHUB_IMAGE: guangshanshui/outlook-email-plus

jobs:
  check-secrets:
    runs-on: ubuntu-latest
    outputs:
      has_secrets: ${{ steps.check.outputs.has_secrets }}
    steps:
      - id: check
        env:
          HAS_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          HAS_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [ -n "$HAS_USERNAME" ] && [ -n "$HAS_TOKEN" ]; then
            echo "has_secrets=true" >> $GITHUB_OUTPUT
            echo "✅ Docker Hub credentials found"
          else
            echo "has_secrets=false" >> $GITHUB_OUTPUT
            echo "❌ Docker Hub credentials not configured"
            echo "Please set DOCKERHUB_USERNAME and DOCKERHUB_TOKEN in repository secrets"
          fi

  build-and-push:
    needs: check-secrets
    if: needs.check-secrets.outputs.has_secrets == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_IMAGE }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Image digest
        run: echo ${{ steps.meta.outputs.digest }}
